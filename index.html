<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureText Pro - Sistema de Auditoría</title>
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --dark: #1e293b; --light: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; flex: 1; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-copy { background: #e2e8f0; color: var(--dark); padding: 5px 10px; font-size: 0.8rem; flex: none; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
        th { background: #f1f5f9; }
        
        .status-success { color: var(--success); font-weight: bold; }
        .status-fail { color: var(--danger); font-weight: bold; }
        .status-inactive { color: var(--secondary); text-decoration: line-through; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-token { background: #dbeafe; color: #1e40af; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h2>SecureText: Acceso al Sistema</h2>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <div class="btn-group">
            <button class="btn-primary" onclick="app.login()">Entrar</button>
            <button style="background:#64748b; color:white;" onclick="app.register()">Registrarse</button>
        </div>
    </div>

    <div id="main-section" class="hidden">
        <div class="nav">
            <h3>Usuario: <span id="user-display"></span></h3>
            <button class="btn-danger" onclick="app.logout()" style="flex:none">Salir</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <section>
                <h4>1. Cifrar Nuevo Mensaje</h4>
                <textarea id="text-to-encrypt" placeholder="Mensaje secreto..."></textarea>
                <button class="btn-primary" onclick="app.encrypt()">Generar y Guardar</button>
            </section>

            <section>
                <h4>2. Descifrar con Token</h4>
                <input type="text" id="token-input" placeholder="Pegue el token aquí">
                <button class="btn-success" onclick="app.decryptByToken()">Validar Token</button>
            </section>
        </div>

        <section>
            <h4>Historial y Auditoría de Intentos</h4>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Token</th>
                            <th>Contenido Original</th>
                            <th>Estado</th>
                            <th>Último Intento (Audit)</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script>
    class EncryptionRecord {
        constructor(token, text, owner) {
            this.token = token;
            this.originalText = text;
            this.owner = owner;
            this.status = "ACTIVO"; // ACTIVO, INACTIVO o FALLIDO
            this.timestamp = "Sin intentos";
        }
    }

    class AppEngine {
        constructor() {
            this.currentUser = null;
            this.records = JSON.parse(localStorage.getItem('records')) || [];
            this.users = JSON.parse(localStorage.getItem('users')) || [];
            this.checkSession();
        }

        // --- GESTIÓN DE ACCESO ---
        register() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Campos vacíos");
            if(this.users.find(user => user.username === u)) return alert("El usuario ya existe");
            
            this.users.push({username: u, password: p});
            localStorage.setItem('users', JSON.stringify(this.users));
            alert("Registro exitoso");
        }

        login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const user = this.users.find(user => user.username === u && user.password === p);
            if(user) {
                this.currentUser = u;
                sessionStorage.setItem('activeUser', u);
                this.showMain();
            } else {
                alert("Credenciales inválidas");
            }
        }

        // --- LÓGICA CORE ---
        encrypt() {
            const text = document.getElementById('text-to-encrypt').value.trim();
            if(!text) return;

            const token = Math.random().toString(36).substring(2, 8).toUpperCase();
            const newRec = new EncryptionRecord(token, text, this.currentUser);
            
            this.records.push(newRec);
            this.save();
            this.renderHistory();
            document.getElementById('text-to-encrypt').value = "";
        }

        decryptByToken() {
            const tInput = document.getElementById('token-input').value.trim().toUpperCase();
            const record = this.records.find(r => r.token === tInput && r.owner === this.currentUser);

            if(record) {
                if(record.status === "INACTIVO") {
                    alert("Este mensaje ha sido desactivado (Borrado Lógico).");
                    return;
                }
                record.timestamp = `EXITOSO: ${new Date().toLocaleString()}`;
                record.status = "ACTIVO"; 
                alert("Mensaje: " + record.originalText);
            } else {
                // Auditoría de fallos: Si el token no existe, podrías registrar el error aquí
                // Pero como solo mostramos el historial del dueño, alertamos el error.
                alert("Token no encontrado o no autorizado.");
            }
            this.save();
            this.renderHistory();
        }

        // --- BORRADO LÓGICO ---
        toggleStatus(token) {
            const record = this.records.find(r => r.token === token);
            if(record) {
                record.status = (record.status === "ACTIVO") ? "INACTIVO" : "ACTIVO";
                this.save();
                this.renderHistory();
            }
        }

        // --- USABILIDAD (COPIAR) ---
        copyToken(token) {
            navigator.clipboard.writeText(token);
            alert("Token " + token + " copiado al portapapeles");
        }

        renderHistory() {
            const body = document.getElementById('history-body');
            body.innerHTML = "";
            const myRecords = this.records.filter(r => r.owner === this.currentUser);

            myRecords.forEach(r => {
                const isInactive = r.status === "INACTIVO";
                body.innerHTML += `
                    <tr>
                        <td>
                            <span class="badge badge-token">${r.token}</span>
                            <button class="btn-copy" onclick="app.copyToken('${r.token}')">📋</button>
                        </td>
                        <td class="${isInactive ? 'status-inactive' : ''}">${r.originalText}</td>
                        <td><span class="${isInactive ? 'status-fail' : 'status-success'}">${r.status}</span></td>
                        <td><small>${r.timestamp}</small></td>
                        <td>
                            <button class="btn-danger" style="padding:5px" onclick="app.toggleStatus('${r.token}')">
                                ${isInactive ? 'Reactivar' : 'Desactivar'}
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        save() { localStorage.setItem('records', JSON.stringify(this.records)); }
        
        showMain() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = this.currentUser;
            this.renderHistory();
        }

        checkSession() {
            const s = sessionStorage.getItem('activeUser');
            if(s) { this.currentUser = s; this.showMain(); }
        }

        logout() { sessionStorage.clear(); location.reload(); }
    }

    const app = new AppEngine();
</script>
</body>
</html>
