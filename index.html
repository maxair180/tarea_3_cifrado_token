<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAYA´s Security</title>
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #10b981; --danger: #ef4444; --dark: #1e293b; --light: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        .card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #fff; }
        .public-zone { background: #f0fdf4; border: 2px solid #10b981; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-copy { background: #e2e8f0; color: var(--dark); padding: 5px 8px; font-size: 0.75rem; margin-left: 5px; }
        .btn-copy:hover { background: #cbd5e1; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem; }
        th { background: #f8fafc; color: #64748b; }
        
        .status-inactive { text-decoration: line-through; color: var(--secondary); opacity: 0.6; }
        .badge-active { color: var(--success); font-weight: bold; }
        .badge-inactive { color: var(--danger); font-weight: bold; }

        .helper-text { font-size: 0.75rem; color: var(--secondary); margin-top: -5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="public-section" class="card public-zone">
        <h2 style="color: #047857; margin-top:0;">🔓 Consulta Rápida</h2>
        <input type="text" id="public-token-input" placeholder="Ingresa el Token para descifrar">
        <button class="btn-success" style="width:100%" onclick="app.publicDecrypt()">Descifrar Mensaje</button>
        <div id="public-result" style="margin-top:15px; font-weight:bold;"></div>
    </div>

    <div id="auth-section" class="card">
        <h3>🔐 Acceso y Registro</h3>
        
        <div id="login-form">
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <div style="display:flex; gap:10px;">
                <button class="btn-primary" onclick="app.login()">Entrar al Panel</button>
                <button style="background:var(--secondary); color:white; width:100%;" onclick="app.toggleAuthMode(true)">¿No tienes cuenta? Regístrate</button>
            </div>
        </div>

        <div id="register-form" class="hidden">
            <h4 style="margin-bottom: 10px; color: var(--primary);">Crear Nueva Cuenta</h4>
            <input type="text" id="reg-username" placeholder="Elige un nombre de usuario">
            <input type="password" id="reg-password" placeholder="Contraseña (mínimo 8 caracteres)">
            <p class="helper-text">Debe tener al menos 8 caracteres para mayor seguridad.</p>
            <input type="password" id="reg-confirm-password" placeholder="Repite tu contraseña">
            
            <div style="display:flex; gap:10px;">
                <button class="btn-success" style="width:100%" onclick="app.register()">Finalizar Registro</button>
                <button style="background:var(--secondary); color:white; width:100%;" onclick="app.toggleAuthMode(false)">Volver al Login</button>
            </div>
        </div>
    </div>

    <div id="main-section" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3>Panel de: <span id="user-display" style="color:var(--primary)"></span></h3>
            <button class="btn-danger" style="width:auto" onclick="app.logout()">Cerrar Sesión</button>
        </div>

        <div class="card">
            <h4>Cifrar Nuevo Texto</h4>
            <textarea id="text-to-encrypt" placeholder="Escribe tu mensaje secreto..."></textarea>
            <button class="btn-primary" onclick="app.encrypt()">Generar Token</button>
        </div>

        <h4>Tu Historial de Auditoría</h4>
        <div style="overflow-x:auto">
            <table>
                <thead>
                    <tr>
                        <th>Token</th>
                        <th>Mensaje</th>
                        <th>Estado</th>
                        <th>Último Acceso</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    class EncryptionRecord {
        constructor(token, text, owner) {
            this.token = token;
            this.originalText = text;
            this.owner = owner;
            this.status = "ACTIVO"; 
            this.timestamp = "Nunca consultado";
        }
    }

    class AppEngine {
        constructor() {
            this.currentUser = null;
            this.records = JSON.parse(localStorage.getItem('records')) || [];
            this.users = JSON.parse(localStorage.getItem('users')) || [];
            this.checkSession();
        }

        toggleAuthMode(isRegister) {
            document.getElementById('login-form').classList.toggle('hidden', isRegister);
            document.getElementById('register-form').classList.toggle('hidden', !isRegister);
        }

        publicDecrypt() {
            const tInput = document.getElementById('public-token-input').value.trim().toUpperCase();
            const resultDiv = document.getElementById('public-result');
            const record = this.records.find(r => r.token === tInput);

            if(record) {
                if(record.status === "INACTIVO") {
                    resultDiv.innerHTML = "❌ Error: Mensaje desactivado por el emisor.";
                    resultDiv.style.color = "red";
                } else {
                    record.timestamp = `Público: ${new Date().toLocaleString()}`;
                    this.save();
                    resultDiv.innerHTML = `✅ Mensaje de ${record.owner}: <br>"${record.originalText}"`;
                    resultDiv.style.color = "#065f46";
                    this.renderHistory(); 
                }
            } else {
                resultDiv.innerHTML = "❌ Token no válido.";
                resultDiv.style.color = "red";
            }
        }

        register() {
            const u = document.getElementById('reg-username').value.trim();
            const p = document.getElementById('reg-password').value;
            const pConf = document.getElementById('reg-confirm-password').value;

            if(!u || !p || !pConf) return alert("Por favor, llena todos los campos.");
            
            if(p.length < 8) return alert("Seguridad insuficiente: La contraseña debe tener al menos 8 caracteres.");
            
            if(p !== pConf) return alert("Error: Las contraseñas no coinciden. Verifícalas.");
            
            if(this.users.find(user => user.username.toLowerCase() === u.toLowerCase())) {
                return alert("Este nombre de usuario ya está ocupado.");
            }

            this.users.push({username: u, password: p});
            localStorage.setItem('users', JSON.stringify(this.users));
            alert("¡Registro exitoso! Ahora inicia sesión.");
            this.toggleAuthMode(false);
        }

        login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const user = this.users.find(user => user.username.toLowerCase() === u.toLowerCase() && user.password === p);
            
            if(user) {
                this.currentUser = user.username;
                sessionStorage.setItem('activeUser', this.currentUser);
                this.showMain();
            } else { alert("Usuario o contraseña incorrectos."); }
        }

        encrypt() {
            const text = document.getElementById('text-to-encrypt').value.trim();
            if(!text) return alert("Escribe un mensaje");
            const token = Math.random().toString(36).substring(2, 8).toUpperCase();
            this.records.push(new EncryptionRecord(token, text, this.currentUser));
            this.save();
            this.renderHistory();
            document.getElementById('text-to-encrypt').value = "";
            alert("Token generado con éxito.");
        }

        copyToken(token) {
            navigator.clipboard.writeText(token).then(() => {
                alert("Token copiado.");
            });
        }

        toggleStatus(token) {
            const record = this.records.find(r => r.token === token);
            if(record) {
                record.status = (record.status === "ACTIVO") ? "INACTIVO" : "ACTIVO";
                this.save();
                this.renderHistory();
            }
        }

        renderHistory() {
            const body = document.getElementById('history-body');
            if(!body) return;
            body.innerHTML = "";
            const myRecords = this.records.filter(r => r.owner === this.currentUser);

            myRecords.forEach(r => {
                const inactive = r.status === "INACTIVO";
                body.innerHTML += `
                    <tr>
                        <td>
                            <b>${r.token}</b>
                            <button class="btn-copy" onclick="app.copyToken('${r.token}')">📋 Copiar</button>
                        </td>
                        <td class="${inactive ? 'status-inactive' : ''}">${r.originalText}</td>
                        <td class="${inactive ? 'badge-inactive' : 'badge-active'}">${r.status}</td>
                        <td><small>${r.timestamp}</small></td>
                        <td>
                            <button class="${inactive ? 'btn-success' : 'btn-danger'}" 
                                    style="width: 110px;"
                                    onclick="app.toggleStatus('${r.token}')">
                                ${inactive ? 'Activar' : 'Desactivar'}
                            </button>
                        </td>
                    </tr>`;
            });
        }

        save() { localStorage.setItem('records', JSON.stringify(this.records)); }
        
        showMain() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = this.currentUser;
            this.renderHistory();
        }

        checkSession() {
            const s = sessionStorage.getItem('activeUser');
            if(s) { this.currentUser = s; this.showMain(); }
        }

        logout() { sessionStorage.clear(); location.reload(); }
    }

    const app = new AppEngine();
</script>
</body>
</html>
